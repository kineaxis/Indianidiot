<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Soldier's Vanguard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#06000e;font-family:'Exo 2',sans-serif;color:#e0d0ff;}
.page{position:absolute;inset:0;display:none;}
.page.show{display:flex;flex-direction:column;}
#pg-menu.show,#pg-setup.show{align-items:center;justify-content:center;}

/* MENU */
#pg-menu{background:radial-gradient(ellipse at 50% 25%,#1a0038 0%,#06000e 70%);}
.grid-bg{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(140,0,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(140,0,255,.06) 1px,transparent 1px);background-size:32px 32px;}
.menu-wrap{position:relative;z-index:1;text-align:center;padding:32px 24px;width:100%;max-width:380px;}
.m-icon{font-size:60px;margin-bottom:12px;display:block;filter:drop-shadow(0 0 20px #ff2d78) drop-shadow(0 0 40px #b400ff);}
.m-title{font-family:'Orbitron',sans-serif;font-size:clamp(18px,5vw,30px);font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,#ff2d78,#ff9500,#00e5ff,#b400ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.m-sub{font-size:9px;letter-spacing:5px;color:#4a2060;margin:6px 0 28px;text-transform:uppercase;}
.m-line{width:60px;height:2px;background:linear-gradient(90deg,#ff2d78,#b400ff);margin:0 auto 24px;border-radius:2px;}
.btn{display:block;width:100%;max-width:260px;margin:10px auto;padding:15px;border:none;border-radius:50px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:.2s;}
.btn-main{background:linear-gradient(135deg,#ff2d78,#b400ff);color:#fff;box-shadow:0 0 24px rgba(255,45,120,.45),0 4px 16px rgba(180,0,255,.3);}
.btn-main:active{transform:scale(.96);}
.btn-out{background:transparent;color:#5a3070;border:1px solid #2a1048;}
.btn-out:active{border-color:#b400ff;color:#b400ff;}

/* SETUP */
#pg-setup{background:radial-gradient(ellipse at 50% 25%,#1a0038 0%,#06000e 70%);}
.setup-card{background:rgba(16,0,32,.9);border:1px solid #2a1048;border-radius:20px;padding:24px 18px;width:100%;max-width:360px;position:relative;z-index:1;}
.sh{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px;text-align:center;background:linear-gradient(90deg,#ff2d78,#b400ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px;}
.sl{font-size:8px;letter-spacing:4px;color:#4a2060;text-align:center;margin-bottom:8px;text-transform:uppercase;}
.cnt-row{display:flex;gap:7px;justify-content:center;margin-bottom:14px;}
.cnt-btn{padding:8px 14px;border-radius:24px;border:1px solid #2a1048;background:transparent;color:#4a2060;font-family:'Orbitron',sans-serif;font-size:9px;cursor:pointer;transition:.18s;}
.cnt-btn.on{background:rgba(255,45,120,.12);color:#ff2d78;border-color:#ff2d78;}
.pr{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;border:1px solid #160828;margin-bottom:7px;}
.pr.off{opacity:.2;pointer-events:none;}
.pdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pi{flex:1;}.pn{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;}.pf{font-size:7px;color:#4a2060;margin-top:1px;}
.aitog{padding:5px 10px;border-radius:18px;border:1px solid #260a40;background:transparent;color:#4a2060;font-size:8px;cursor:pointer;transition:.18s;}
.aitog.hum{color:#00e5ff;border-color:#00e5ff;background:rgba(0,229,255,.08);}
.aitog.aii{color:#ff2d78;border-color:#ff2d78;background:rgba(255,45,120,.08);}
.sgo{width:100%;padding:14px;margin-top:14px;background:linear-gradient(135deg,#ff2d78,#b400ff);border:none;border-radius:40px;color:#fff;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;cursor:pointer;}
.sgo:active{transform:scale(.97);}
.sbk{display:block;text-align:center;margin-top:8px;background:none;border:none;color:#4a2060;font-size:8px;letter-spacing:3px;cursor:pointer;padding:6px;}

/* GAME */
#pg-game{background:#06000e;}
#topbar{flex-shrink:0;height:40px;background:rgba(10,0,20,.98);border-bottom:1px solid #1e0840;display:flex;align-items:center;justify-content:space-between;padding:0 12px;}
.tb-logo{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:3px;background:linear-gradient(90deg,#ff2d78,#b400ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#tb-info{font-size:8px;color:#4a2060;letter-spacing:1px;}
#tb-back{padding:3px 9px;background:transparent;border:1px solid #1e0840;border-radius:16px;color:#4a2060;font-size:8px;cursor:pointer;}
#tb-back:active{border-color:#b400ff;color:#b400ff;}

#pstrip{flex-shrink:0;height:62px;background:rgba(8,0,16,.96);border-bottom:1px solid #14062a;display:flex;align-items:center;padding:0 8px;gap:6px;overflow-x:auto;}
.pc{flex-shrink:0;min-width:72px;background:rgba(16,0,32,.85);border:1.5px solid #14062a;border-radius:10px;padding:5px 8px;transition:.2s;}
.pc.act{border-color:var(--c);box-shadow:0 0 10px color-mix(in srgb,var(--c) 35%,transparent);}
.pc-row{display:flex;align-items:center;gap:4px;margin-bottom:2px;}
.pcdot{width:6px;height:6px;border-radius:50%;}
.pcn{font-family:'Orbitron',sans-serif;font-size:7px;font-weight:700;}
.pcs{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;line-height:1.1;}
.pcbar{height:2px;background:#14062a;border-radius:1px;margin-top:3px;overflow:hidden;}
.pcfill{height:100%;border-radius:1px;transition:width .4s;}
.pcpips{display:flex;gap:3px;margin-top:2px;}
.pcpip{width:5px;height:5px;border-radius:50%;border:1px solid #14062a;}

#msgbar{flex-shrink:0;min-height:30px;background:rgba(8,0,14,.8);border-bottom:1px solid #14062a;display:flex;align-items:center;justify-content:center;padding:4px 12px;text-align:center;font-size:9px;color:#7040a0;line-height:1.4;}
#msgbar.urg{color:#ff9500;}
#msgbar.dan{color:#ff2d78;}
#msgbar.unq{color:#c060ff;text-shadow:0 0 8px rgba(180,0,255,.35);}

#phasebar{flex-shrink:0;height:22px;display:flex;align-items:center;justify-content:center;background:rgba(6,0,12,.7);}
.ptag{font-family:'Orbitron',sans-serif;font-size:7px;font-weight:700;letter-spacing:3px;padding:2px 10px;border-radius:12px;}
.ptag.idle{background:rgba(60,20,90,.1);color:#4a2060;border:1px solid #1a0840;}
.ptag.act{background:rgba(0,229,255,.07);color:#00e5ff;border:1px solid rgba(0,229,255,.2);animation:blink 1.4s infinite;}
.ptag.cmb{background:rgba(255,45,120,.08);color:#ff2d78;border:1px solid rgba(255,45,120,.25);animation:blink .9s infinite;}
.ptag.unq{background:rgba(180,0,255,.1);color:#b400ff;border:1px solid rgba(180,0,255,.3);animation:blink .7s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

#c3d{display:block;flex-shrink:0;width:100%;}

#bot{flex:1;min-height:0;overflow-y:auto;background:rgba(8,0,16,.98);border-top:1px solid #1e0840;padding:12px;}

/* DICE VIEW */
#view-dice{flex-direction:column;gap:10px;}
#view-dice.show{display:flex;}
.dlbl{font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:3px;color:#4a2060;text-align:center;}
.dice-row{display:flex;align-items:center;justify-content:center;gap:8px;}
.die-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.die-tag{font-family:'Orbitron',sans-serif;font-size:8px;color:#4a2060;letter-spacing:1px;}
canvas.dc{display:block;border-radius:10px;border:2px solid #1e0840;}
.op-sym{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;color:#2a1050;padding-bottom:20px;}
#sum-box{width:64px;height:64px;border-radius:10px;border:2px solid #1e0840;background:rgba(16,0,32,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:.3s;}
#sum-val{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:#4a2060;}
#sum-lbl{font-family:'Orbitron',sans-serif;font-size:6px;color:#4a2060;letter-spacing:1px;margin-top:1px;}
#rollbtn{width:100%;padding:14px;border:none;border-radius:40px;background:linear-gradient(135deg,#ff2d78 0%,#ff9500 50%,#b400ff 100%);color:#fff;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:4px;cursor:pointer;box-shadow:0 4px 20px rgba(255,45,120,.4),0 0 30px rgba(180,0,255,.2);transition:.2s;}
#rollbtn:disabled{opacity:.25;cursor:default;box-shadow:none;}
#rollbtn:active:not(:disabled){transform:scale(.97);}
#dhint{font-size:8px;color:#5a3070;text-align:center;letter-spacing:2px;min-height:14px;margin-top:4px;}
#storagebar{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;padding-top:4px;}
.slbl{font-family:'Orbitron',sans-serif;font-size:7px;color:#4a2060;letter-spacing:2px;}
#sdice{display:flex;gap:5px;}
#stip{font-size:8px;color:#ff9500;text-align:center;width:100%;min-height:12px;}

/* SLOT VIEW */
#view-slot{flex-direction:column;gap:10px;}
#view-slot.show{display:flex;}
.shint{text-align:center;padding:14px;border-radius:14px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;}
.shint.normal{background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.2);color:#00e5ff;}
.shint.power{background:rgba(255,149,0,.08);border:1px solid rgba(255,149,0,.3);color:#ff9500;animation:blink 1s infinite;}
.shint.unique{background:rgba(180,0,255,.1);border:1px solid rgba(180,0,255,.35);color:#b400ff;animation:blink .75s infinite;}
.slot-dice-summary{display:flex;align-items:center;justify-content:center;gap:10px;padding:8px;background:rgba(16,0,32,.6);border-radius:12px;border:1px solid #1e0840;}
#sum-box2{width:44px;height:44px;border-radius:8px;border:2px solid #1e0840;background:rgba(16,0,32,.7);display:flex;align-items:center;justify-content:center;transition:.3s;}
#sum-val2{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;color:#00e5ff;}
#storagebar2{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;}
#sdice2{display:flex;gap:5px;}
#stip2{font-size:8px;color:#ff9500;text-align:center;width:100%;min-height:12px;}

/* COMBAT SHEET */
#combat-sheet{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);display:none;align-items:flex-end;justify-content:center;}
#combat-sheet.show{display:flex;}
#combat-modal{width:100%;max-width:480px;background:linear-gradient(180deg,rgba(24,0,44,.99),rgba(6,0,14,.99));border:1px solid #3a1060;border-top-left-radius:24px;border-top-right-radius:24px;padding:16px 16px 36px;animation:su .25s ease-out;}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.cm-bar{width:32px;height:3px;background:#3a1060;border-radius:2px;margin:0 auto 14px;}
.cm-title{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;letter-spacing:3px;text-align:center;background:linear-gradient(90deg,#ff2d78,#b400ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:3px;}
.cm-sub{font-size:9px;color:#7040a0;text-align:center;margin-bottom:12px;}
.cm-tgt{background:rgba(255,45,120,.06);border:1px solid rgba(255,45,120,.18);border-radius:12px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.cm-tgt-icon{font-size:30px;}.cm-tgt-name{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;}.cm-tgt-info{font-size:9px;color:#7040a0;margin-top:2px;}
.cm-acts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.ca{padding:12px 6px;border-radius:12px;border:1px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:.5px;transition:.15s;text-transform:uppercase;background:transparent;}
.ca:active{transform:scale(.94);}
.ci{font-size:22px;}.cp2{font-size:8px;opacity:.6;}
.ca-d{border-color:rgba(255,45,120,.3);color:#ff2d78;background:rgba(255,45,120,.06);}
.ca-w{border-color:rgba(255,149,0,.3);color:#ff9500;background:rgba(255,149,0,.06);}
.ca-b{border-color:rgba(0,229,255,.25);color:#00e5ff;background:rgba(0,229,255,.05);}
#cm-skip{width:100%;padding:11px;background:transparent;border:1px solid #1a0838;border-radius:40px;color:#4a2060;font-size:9px;letter-spacing:3px;cursor:pointer;font-family:'Orbitron',sans-serif;}
#cm-skip:active{border-color:#6030a0;}

/* GAME OVER */
#go-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(16px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
#go-overlay.show{display:flex;}
.go-box{background:linear-gradient(180deg,rgba(24,0,44,.99),rgba(6,0,14,.99));border:1px solid;border-radius:24px;padding:28px 22px;text-align:center;max-width:340px;width:100%;animation:fl 3s ease-in-out infinite;}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.go-ico{font-size:48px;margin-bottom:6px;}.go-sub{font-size:7px;letter-spacing:6px;color:#4a2060;margin-bottom:6px;}.go-name{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;letter-spacing:2px;margin-bottom:3px;}.go-fac{font-size:8px;color:#5a3070;letter-spacing:2px;margin-bottom:16px;}.go-sc{margin-bottom:20px;}.go-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #140628;}
.go-btn{padding:13px 36px;border:none;border-radius:40px;background:linear-gradient(135deg,#ff2d78,#b400ff);color:#fff;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;cursor:pointer;}
.go-btn:active{transform:scale(.97);}

@keyframes uqbg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
#pg-game.uqmode #bot{background:linear-gradient(-45deg,rgba(180,0,255,.1),rgba(255,45,120,.08),rgba(0,229,255,.05),rgba(180,0,255,.1));background-size:400% 400%;animation:uqbg 1.8s ease infinite;}
</style>
</head>
<body>

<div id="pg-menu" class="page show">
  <div class="grid-bg"></div>
  <div class="menu-wrap">
    <span class="m-icon">⚔</span>
    <div class="m-title">SOLDIER'S VANGUARD</div>
    <div class="m-sub">3D TACTICAL · MOBILE</div>
    <div class="m-line"></div>
    <button class="btn btn-main" onclick="goSetup()">▶ ENTER BATTLE</button>
    <button class="btn btn-out" onclick="toggleMute()">♪ TOGGLE AUDIO</button>
  </div>
</div>

<div id="pg-setup" class="page">
  <div class="grid-bg"></div>
  <div class="setup-card">
    <div class="sh">Configure Battle</div>
    <div class="sl">Players</div>
    <div class="cnt-row" id="cnt-row"></div>
    <div class="sl">Commanders</div>
    <div id="setup-rows"></div>
    <button class="sgo" onclick="startGame()">DEPLOY FORCES →</button>
    <button class="sbk" onclick="showPage('pg-menu')">← BACK</button>
  </div>
</div>

<div id="pg-game" class="page">
  <div id="topbar">
    <div class="tb-logo">S·VANGUARD</div>
    <div id="tb-info">T0 · 150PTS</div>
    <button id="tb-back" onclick="backMenu()">MENU</button>
  </div>
  <div id="pstrip"><div id="pcards" style="display:flex;gap:6px;align-items:center;"></div></div>
  <div id="msgbar">Roll the dice to begin.</div>
  <div id="phasebar"><span id="ptag" class="ptag idle">STANDBY</span></div>
  <canvas id="c3d"></canvas>
  <div id="bot">

    <div id="view-dice">
      <div class="dlbl">DICE COMMAND · AUTO SUM</div>
      <div class="dice-row">
        <div class="die-wrap"><div class="die-tag">D5</div><canvas class="dc" id="dc0" width="64" height="64"></canvas></div>
        <div class="op-sym">+</div>
        <div class="die-wrap"><div class="die-tag">D4</div><canvas class="dc" id="dc1" width="64" height="64"></canvas></div>
        <div class="op-sym">=</div>
        <div class="die-wrap">
          <div class="die-tag">SLOT</div>
          <div id="sum-box"><div id="sum-val">?</div><div id="sum-lbl"></div></div>
        </div>
      </div>
      <button id="rollbtn" onclick="doRoll()">▶ ROLL DICE</button>
      <div id="dhint"></div>
      <div id="storagebar">
        <div class="slbl">RESERVE (<span id="scnt">0</span>/3)</div>
        <div id="sdice"></div>
        <div id="stip"></div>
      </div>
    </div>

    <div id="view-slot">
      <div class="slot-dice-summary">
        <canvas class="dc" id="dc0b" width="44" height="44"></canvas>
        <div class="op-sym" style="font-size:14px;padding-bottom:0;">+</div>
        <canvas class="dc" id="dc1b" width="44" height="44"></canvas>
        <div class="op-sym" style="font-size:14px;padding-bottom:0;">=</div>
        <div id="sum-box2"><span id="sum-val2">?</span></div>
      </div>
      <div id="slot-hint" class="shint normal">TAP SLOT ON BOARD ABOVE</div>
      <div id="storagebar2">
        <div class="slbl">RESERVE (<span id="scnt2">0</span>/3)</div>
        <div id="sdice2"></div>
        <div id="stip2"></div>
      </div>
    </div>

  </div>
</div>

<div id="combat-sheet">
  <div id="combat-modal">
    <div class="cm-bar"></div>
    <div class="cm-title">⚔ COMBAT</div>
    <div class="cm-sub" id="cm-sub">Choose your action</div>
    <div class="cm-tgt">
      <div class="cm-tgt-icon" id="cm-icon">🗡</div>
      <div><div class="cm-tgt-name" id="cm-unit">Veteran</div><div class="cm-tgt-info" id="cm-info">Slot 5 · Player 2</div></div>
    </div>
    <div class="cm-acts">
      <button class="ca ca-d" onclick="doCombat('destroy')"><span class="ci">💥</span><span>DESTROY</span><span class="cp2" id="cpts">+35</span></button>
      <button class="ca ca-w" onclick="doCombat('weaken')"><span class="ci">🔻</span><span>WEAKEN</span><span class="cp2">-1 tier</span></button>
      <button class="ca ca-b" onclick="doCombat('block')"><span class="ci">🚫</span><span>BLOCK</span><span class="cp2">8s</span></button>
    </div>
    <button id="cm-skip" onclick="doSkip()">SKIP / PASS</button>
  </div>
</div>

<div id="go-overlay">
  <div class="go-box" id="go-box">
    <div class="go-ico">🏆</div>
    <div class="go-sub">VICTORY</div>
    <div class="go-name" id="go-name"></div>
    <div class="go-fac" id="go-fac"></div>
    <div class="go-sc" id="go-sc"></div>
    <button class="go-btn" onclick="backMenu()">MAIN MENU</button>
  </div>
</div>

<script>
/* ═══ CONSTANTS ═══ */
const WIN=150,MS=3;
const UNITS=["Empty","Soldier","Upgraded","CombatReady","Veteran"];
const PTS={Soldier:5,Upgraded:10,CombatReady:20,Veteran:35};
const UCSS={Empty:'#4a2060',Soldier:'#4ade80',Upgraded:'#60a5fa',CombatReady:'#ff9500',Veteran:'#ff2d78'};
const UICONS={Soldier:'🪖',Upgraded:'⚔️',CombatReady:'🛡️',Veteran:'👑'};
const PC=[
  {id:0,name:"P1",full:"Player 1",fac:"Iron Vanguard",  css:"#ff2d78",hex:0xff2d78,rgb:[1,.18,.47]},
  {id:1,name:"P2",full:"Player 2",fac:"Frost Legion",   css:"#00e5ff",hex:0x00e5ff,rgb:[0,.9,1]},
  {id:2,name:"P3",full:"Player 3",fac:"Storm Brigade",  css:"#b400ff",hex:0xb400ff,rgb:[.7,0,1]},
  {id:3,name:"P4",full:"Player 4",fac:"Ember Corps",    css:"#ff9500",hex:0xff9500,rgb:[1,.58,0]},
];

/* ═══ AUDIO ═══ */
let AC=null,MG=null,SG=null,MUTED=false;
function initAudio(){
  if(AC)return;
  try{
    AC=new(window.AudioContext||window.webkitAudioContext)();
    MG=AC.createGain();MG.gain.value=.18;MG.connect(AC.destination);
    SG=AC.createGain();SG.gain.value=.55;SG.connect(AC.destination);
    startMusic();
  }catch(e){}
}
function toggleMute(){MUTED=!MUTED;if(MG)MG.gain.value=MUTED?0:.18;if(SG)SG.gain.value=MUTED?0:.55;}
function beep(f,t,d,v,dl=0){
  if(!AC||MUTED)return;
  try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(SG);o.type=t;o.frequency.value=f;const ts=AC.currentTime+dl;g.gain.setValueAtTime(v,ts);g.gain.exponentialRampToValueAtTime(.001,ts+d);o.start(ts);o.stop(ts+d+.05);}catch(e){}
}
function noise(d,v){
  if(!AC||MUTED)return;
  try{const b=AC.createBuffer(1,AC.sampleRate*d,AC.sampleRate);const dt=b.getChannelData(0);for(let i=0;i<dt.length;i++)dt[i]=Math.random()*2-1;const s=AC.createBufferSource(),f=AC.createBiquadFilter(),g=AC.createGain();f.type='bandpass';f.frequency.value=600;s.buffer=b;s.connect(f);f.connect(g);g.connect(SG);g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);s.start();s.stop(AC.currentTime+d);}catch(e){}
}
const SFX={
  roll:()=>{noise(.05,.15);beep(180,'sawtooth',.05,.2);},
  spawn:()=>{beep(220,'square',.08,.28);beep(440,'sine',.12,.32,.1);},
  upgrade:()=>{[220,330,440,550].forEach((f,i)=>beep(f,'sine',.1,.28,i*.05));},
  destroy:()=>{noise(.25,.45);beep(60,'sawtooth',.35,.45);},
  weaken:()=>{beep(280,'sawtooth',.08,.3);beep(160,'sawtooth',.12,.2,.07);},
  block:()=>{[360,240,120].forEach((f,i)=>beep(f,'square',.06,.3,i*.06));},
  victory:()=>{[[523,.4],[659,.4],[784,.4],[1047,.6]].forEach(([f,d],i)=>beep(f,'sine',d,.45,i*.12));},
  power:()=>{[80,130,200,300].forEach((f,i)=>beep(f,'sawtooth',.09,.38,i*.04));},
  unique:()=>{[140,280,560,1120].forEach((f,i)=>beep(f,'sine',.14,.4,i*.05));},
  click:()=>beep(800,'sine',.04,.12),
  error:()=>{beep(100,'sawtooth',.08,.25);}
};
function startMusic(){
  if(!AC)return;
  try{
    const BPM=88,B=60/BPM*4,SC=[55,58,62,65,67,70,74];
    function note(f,t,d,v=.04){const o=AC.createOscillator(),lp=AC.createBiquadFilter(),g=AC.createGain();lp.type='lowpass';lp.frequency.value=850;o.connect(lp);lp.connect(g);g.connect(MG);o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+d);o.start(t);o.stop(t+d+.1);}
    let t=AC.currentTime+.1;
    (function loop(){[0,0,4,2,5,3,6,1].forEach((si,i)=>note(SC[si]*2,t+(i/4)*(60/BPM),.15,.04));[0,2,0,3].forEach((si,i)=>note(SC[si]*.5,t+i*(60/BPM),.55,.032));[0,2,4].forEach(si=>note(SC[si],t,B*.9,.02));t+=B;setTimeout(loop,B*1000-80);})();
  }catch(e){}
}

const SP3=3.2,OFF3=SP3;
function sp3d(i){return{x:(i%3)*SP3-OFF3,z:Math.floor(i/3)*SP3-OFF3};}

function buildSlots3D(){
  slotM.forEach(s=>{scene.remove(s.m);scene.remove(s.r);});slotM=[];
  for(let i=0;i<9;i++){
    const{x,z}=sp3d(i);
    const mat=new THREE.MeshStandardMaterial({color:0x1a002a,roughness:.65,metalness:.2,emissive:0x120018,emissiveIntensity:.08});
    const m=new THREE.Mesh(new THREE.CylinderGeometry(1.2,1.26,.2,32),mat);m.position.set(x,-.56,z);m.receiveShadow=true;m.userData.si=i;scene.add(m);
    const rm=new THREE.MeshStandardMaterial({color:0xb400ff,metalness:.97,roughness:.02,emissive:0xb400ff,emissiveIntensity:.5});
    const r=new THREE.Mesh(new THREE.TorusGeometry(1.18,.04,8,40),rm);r.rotation.x=Math.PI/2;r.position.set(x,-.43,z);scene.add(r);
    m.userData.bm=mat;m.userData.rm=rm;slotM.push({m,r});
    const lc=document.createElement('canvas');lc.width=64;lc.height=64;const lx=lc.getContext('2d');lx.font='bold 26px serif';lx.fillStyle='rgba(180,0,255,.6)';lx.textAlign='center';lx.textBaseline='middle';lx.fillText(i+1,32,32);
    const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(lc),transparent:true}));spr.scale.set(.55,.55,1);spr.position.set(x,.2,z);scene.add(spr);
  }
}

function mkTex(rgb,seed){
  const C=document.createElement('canvas');C.width=64;C.height=64;const cx=C.getContext('2d');const[r,g,b]=rgb;
  const bg=cx.createLinearGradient(0,0,64,64);bg.addColorStop(0,`rgb(${r*155|0},${g*65|0},${b*155|0})`);bg.addColorStop(1,`rgb(${r*195|0},${g*95|0},${b*195|0})`);cx.fillStyle=bg;cx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(C);
}
function mkM3(rgb,rough,seed){const[r,g,b]=rgb;return new THREE.MeshStandardMaterial({color:new THREE.Color(r*.45,g*.25,b*.45),map:mkTex(rgb,seed),roughness:rough,metalness:.18,emissive:new THREE.Color(r*.62,g*.32,b*.62),emissiveIntensity:.1});}
function G3(geo,mat,x=0,y=0,z=0){const m=new THREE.Mesh(geo,mat);m.position.set(x,y,z);return m;}
function T3(r,t,mat,y){const m=new THREE.Mesh(new THREE.TorusGeometry(r,t,8,24),mat);m.rotation.x=Math.PI/2;m.position.y=y;return m;}

function buildPiece(unit,pi){
  const g=new THREE.Group();const rgb=PC[pi].rgb;
  const mat=mkM3(rgb,.38,pi*5);const msh=mkM3(rgb,.12,pi*5+3);
  if(unit==="Soldier"){
    const b=G3(new THREE.SphereGeometry(.4,12,8),mat);b.scale.y=.4;g.add(b);
    g.add(G3(new THREE.CylinderGeometry(.14,.26,.6,12),mat,0,.48));
    g.add(G3(new THREE.SphereGeometry(.26,12,8),msh,0,.88));
  }else if(unit==="Upgraded"){
    const b=G3(new THREE.SphereGeometry(.42,12,8),mat);b.scale.y=.36;g.add(b);
    g.add(G3(new THREE.CylinderGeometry(.12,.28,.82,12),mat,0,.55));g.add(T3(.18,.028,mat,.53));
    g.add(G3(new THREE.ConeGeometry(.2,.48,12),msh,0,1.1));g.add(G3(new THREE.SphereGeometry(.065,8,8),msh,0,1.38));
  }else if(unit==="CombatReady"){
    g.add(G3(new THREE.CylinderGeometry(.46,.52,.14,28),mat,0,0));g.add(G3(new THREE.CylinderGeometry(.32,.42,.78,28),mat,0,.46));g.add(T3(.38,.034,mat,.5));
    g.add(G3(new THREE.CylinderGeometry(.4,.32,.18,28),msh,0,.95));
    for(let a=0;a<4;a++){const ag=a*Math.PI/2;const bx=G3(new THREE.BoxGeometry(.12,.2,.12),msh,Math.cos(ag)*.28,1.06,Math.sin(ag)*.28);g.add(bx);}
  }else{
    const b=G3(new THREE.SphereGeometry(.5,14,10),mat);b.scale.y=.33;g.add(b);
    g.add(G3(new THREE.CylinderGeometry(.16,.37,1.05,14),mat,0,.64));g.add(T3(.32,.05,mat,.62));
    g.add(G3(new THREE.CylinderGeometry(.12,.16,.22,12),mat,0,1.28));g.add(G3(new THREE.SphereGeometry(.28,12,8),msh,0,1.48));
    for(let a=0;a<5;a++){const ag=a/5*Math.PI*2;g.add(G3(new THREE.ConeGeometry(.05,.22,8),msh,Math.cos(ag)*.18,1.74,Math.sin(ag)*.18));}
    g.add(T3(.2,.028,msh,1.66));
    const pl=new THREE.PointLight(PC[pi].hex,.8,4);pl.position.y=1.4;g.add(pl);
  }
  g.traverse(c=>{if(c.isMesh){c.castShadow=true;c.receiveShadow=true;}});
  return g;
}

function placeUnit(si,unit,owner){
  if(unitM[si]){scene.remove(unitM[si]);unitM[si]=null;}
  if(unit==="Empty")return;
  const{x,z}=sp3d(si);const m=buildPiece(unit,owner);
  m.position.set(x,5,z);m.scale.setScalar(.01);scene.add(m);unitM[si]=m;
  animSpawn(m,x,-.25,z);
}
function removeUnit(si){
  const m=unitM[si];if(!m)return;
  boom3D(sp3d(si).x,.4,sp3d(si).z,PC[G.board[si].owner||0].hex,18);
  animKill(m);unitM[si]=null;
}
function animSpawn(m,tx,ty,tz){let t=0;(function f(){t+=.065;m.scale.setScalar(Math.min(t,1));m.position.y=ty+Math.sin(Math.min(t,1)*Math.PI)*2;m.rotation.y+=.1;if(t<1.2)requestAnimationFrame(f);else{m.position.y=ty;m.rotation.y=0;}})();}
function animKill(m){let t=0;(function f(){t+=.08;m.scale.multiplyScalar(.87);m.rotation.y+=.18;m.position.y-=.04;m.traverse(c=>{if(c.material){c.material.transparent=true;c.material.opacity=Math.max(0,1-t);}});if(t<1.4)requestAnimationFrame(f);else scene.remove(m);})();}
function animShake(si){const m=unitM[si];if(!m)return;const{x,z}=sp3d(si);let t=0;(function f(){t+=.14;m.position.x=x+Math.sin(t*10)*.15*(1-t/2.5);m.position.z=z+Math.cos(t*8)*.1*(1-t/2.5);if(t<2.5)requestAnimationFrame(f);else{m.position.x=x;m.position.z=z;}})();}
function boom3D(x,y,z,col,n){for(let i=0;i<n;i++){const p=new THREE.Mesh(new THREE.SphereGeometry(.055,4,4),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:1}));p.position.set(x,y,z);p.userData={vx:(Math.random()-.5)*5,vy:Math.random()*4+1,vz:(Math.random()-.5)*5,life:1};scene.add(p);parts.push(p);}}
function tickParts(dt){for(let i=parts.length-1;i>=0;i--){const p=parts[i],u=p.userData;u.life-=dt*1.8;p.position.x+=u.vx*dt;p.position.y+=u.vy*dt;p.position.z+=u.vz*dt;u.vy-=9*dt;p.material.opacity=Math.max(0,u.life);if(u.life<=0){scene.remove(p);parts.splice(i,1);}}}

function updateGlows(){
  slotM.forEach(({m},i)=>{
    const sl=G.board[i];const click=canClick(i);const bm=m.userData.bm,rm=m.userData.rm;if(!bm||!rm)return;
    if(sl.owner!==null){bm.color.set(new THREE.Color(0x1a002a).lerp(new THREE.Color(PC[sl.owner].hex),.18));bm.emissive.set(PC[sl.owner].hex);bm.emissiveIntensity=.13;}
    else{bm.color.set(0x1a002a);bm.emissive.set(0x120018);bm.emissiveIntensity=.08;}
    if(sl.dis){bm.color.set(0x0a0010);bm.emissiveIntensity=.01;}
    let rc=0xb400ff,ri=.4;
    if(click){if(G.phase==='combat'){bm.emissive.set(0xff2d78);bm.emissiveIntensity=.42;rc=0xff2d78;ri=.8;}else{bm.emissive.set(0xff9500);bm.emissiveIntensity=.38;rc=0xff9500;ri=.7;}}
    rm.color.set(rc);rm.emissiveIntensity=ri;
  });
}

function loop3D(){
  RAF=requestAnimationFrame(loop3D);
  const dt=Math.min(clock.getDelta(),.05),et=performance.now()*.001;
  tickParts(dt);
  unitM.forEach((m,i)=>{if(!m)return;m.position.y=-.25+Math.sin(et*1.3+i*.7)*.055;if(G.board[i]&&G.board[i].unit==='Veteran')m.rotation.y+=.009;});
  camera.position.x=Math.sin(et*.035)*.35;camera.lookAt(0,0,0);
  updateGlows();renderer.render(scene,camera);
}

function rayHit(cx,cy){
  const cv=document.getElementById('c3d');const rect=cv.getBoundingClientRect();
  mVec.x=((cx-rect.left)/rect.width)*2-1;mVec.y=-((cy-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mVec,camera);
  const hits=raycaster.intersectObjects(slotM.map(s=>s.m));
  return hits.length?hits[0].object.userData.si:-1;
}
function onCanvasClick(e){const si=rayHit(e.clientX,e.clientY);if(si>=0&&canClick(si)){SFX.click();handleSlot(si);}}
function onCanvasTouch(e){e.preventDefault();const t=e.changedTouches[0];const si=rayHit(t.clientX,t.clientY);if(si>=0&&canClick(si)){SFX.click();handleSlot(si);}}

/* ═══ DICE DRAWING ═══ */
const DOTS={1:[[50,50]],2:[[25,25],[75,75]],3:[[25,25],[50,50],[75,75]],4:[[25,25],[75,25],[25,75],[75,75]],5:[[25,25],[75,25],[50,50],[25,75],[75,75]]};
function drawDie(id,val,rolling,maxVal){
  const el=document.getElementById(id);if(!el)return;
  const cx=el.getContext('2d'),S=el.width;cx.clearRect(0,0,S,S);
  const isD5=maxVal===5;
  const bg=cx.createLinearGradient(0,0,S,S);
  bg.addColorStop(0,isD5?'#260010':'#00101a');bg.addColorStop(1,isD5?'#3a0018':'#001426');
  cx.fillStyle=bg;rr(cx,2,2,S-4,S-4,9);cx.fill();
  const bc=isD5?'#ff2d78':'#00e5ff';
  cx.strokeStyle=bc;cx.lineWidth=2;rr(cx,2,2,S-4,S-4,9);cx.stroke();
  cx.shadowColor=bc;cx.shadowBlur=8;cx.strokeStyle=bc+'33';cx.lineWidth=1;rr(cx,4,4,S-8,S-8,7);cx.stroke();cx.shadowBlur=0;
  const dc=isD5?'#ff9500':'#00e5ff';
  const v=Math.max(1,Math.min(val||1,maxVal));
  (DOTS[v]||[[50,50]]).forEach(([px,py])=>{
    const dx=px/100*S,dy=py/100*S,r=S*.072;
    const dg=cx.createRadialGradient(dx-r*.3,dy-r*.3,0,dx,dy,r);
    dg.addColorStop(0,'#fff');dg.addColorStop(.4,dc);dg.addColorStop(1,dc+'55');
    cx.beginPath();cx.arc(dx,dy,r,0,Math.PI*2);cx.shadowColor=dc;cx.shadowBlur=7;cx.fillStyle=dg;cx.fill();cx.shadowBlur=0;
  });
  cx.fillStyle=bc+'55';cx.font=`bold ${S*.14}px monospace`;cx.textAlign='left';cx.textBaseline='top';cx.fillText('D'+maxVal,3,3);
}
function rr(cx,x,y,w,h,r){cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.arcTo(x+w,y,x+w,y+r,r);cx.lineTo(x+w,y+h-r);cx.arcTo(x+w,y+h,x+w-r,y+h,r);cx.lineTo(x+r,y+h);cx.arcTo(x,y+h,x,y+h-r,r);cx.lineTo(x,y+r);cx.arcTo(x,y,x+r,y,r);cx.closePath();}
function drawStore(pidx,diceId,cntId,tipId){
  const vals=G.ds[pidx];
  const sc=document.getElementById(cntId);if(sc)sc.textContent=vals.length;
  const cont=document.getElementById(diceId);if(!cont)return;cont.innerHTML='';
  for(let i=0;i<MS;i++){
    const cv=document.createElement('canvas');cv.width=36;cv.height=36;cv.className='dc';cont.appendChild(cv);
    const cx=cv.getContext('2d'),S=36;
    if(vals[i]!==undefined){
      const bg=cx.createLinearGradient(0,0,S,S);bg.addColorStop(0,'#160024');bg.addColorStop(1,'#220034');cx.fillStyle=bg;rr(cx,1,1,S-2,S-2,6);cx.fill();cx.strokeStyle='#2a1048';cx.lineWidth=1;rr(cx,1,1,S-2,S-2,6);cx.stroke();
      const v=Math.min(vals[i],5);(DOTS[v]||[[50,50]]).forEach(([px,py])=>{cx.beginPath();cx.arc(px/100*S,py/100*S,S*.068,0,Math.PI*2);cx.fillStyle='#b400ff77';cx.fill();});
    }else{cx.strokeStyle='#1e0840';cx.lineWidth=1;cx.setLineDash([3,3]);rr(cx,1,1,S-2,S-2,6);cx.stroke();cx.setLineDash([]);}
  }
  const tip=document.getElementById(tipId);if(tip)tip.textContent=vals.length===MS-1?'⚡ ONE MORE = POWER TURN':'';
}

    PC.slice(0,np).forEach(p=>{
      const d=document.createElement('div');d.className='pc';d.id='pc'+p.id;d.style.cssText='--c:'+p.css;
      d.innerHTML=`<div class="pc-row"><div class="pcdot" style="background:${p.css}"></div><div class="pcn" style="color:${p.css}">${p.name}${AI[p.id]?'<span style="font-size:6px;color:#4a2060"> AI</span>':''}</div></div><div class="pcs" id="pcs${p.id}" style="color:${p.css}">0</div><div class="pcbar"><div class="pcfill" id="pcf${p.id}" style="background:${p.css};width:0%"></div></div><div class="pcpips" id="pcp${p.id}"></div>`;
      cont.appendChild(d);
    });
  }
  PC.slice(0,np).forEach(p=>{
    const cd=document.getElementById('pc'+p.id);if(!cd)return;
    cd.classList.toggle('act',p.id===cp&&G.phase!=='over');
    const s=document.getElementById('pcs'+p.id);if(s)s.textContent=G.sc[p.id];
    const f=document.getElementById('pcf'+p.id);if(f)f.style.width=Math.min(G.sc[p.id]/WIN*100,100)+'%';
    const pips=document.getElementById('pcp'+p.id);
    if(pips)pips.innerHTML=Array(MS).fill(0).map((_,i)=>`<div class="pcpip" style="background:${i<G.ds[p.id].length?p.css:'#14062a'}"></div>`).join('');
  });

  // Message
  const mb=document.getElementById('msgbar');mb.textContent=G.msg;mb.className='';
  if(G.ue)mb.classList.add('unq');else if(G.phase==='combat')mb.classList.add('dan');else if(G.phase==='selectSlot')mb.classList.add('urg');

  // Phase tag
  const pmap={idle:'STANDBY',rolling:'ROLLING…',selectSlot:'TAP SLOT',uniqueEvent:'UNIQUE!',combat:'COMBAT',over:'FINISHED'};
  const pt=document.getElementById('ptag');
  pt.textContent=pmap[G.phase]||G.phase.toUpperCase();
  pt.className='ptag '+({idle:'idle',over:'idle',rolling:'act',selectSlot:'act',uniqueEvent:'unq',combat:'cmb'}[G.phase]||'idle');

  document.getElementById('tb-info').textContent=`T${G.turn}·${WIN}PTS`;
  if(G.ue)pg.classList.add('uqmode');else pg.classList.remove('uqmode');

  const inSlot=['selectSlot','uniqueEvent'].includes(G.phase);

  // Show/hide views
  const vd=document.getElementById('view-dice');
  const vs=document.getElementById('view-slot');
  if(inSlot){vd.classList.remove('show');vs.classList.add('show');}
  else{vd.classList.add('show');vs.classList.remove('show');}

  if(!inSlot){
    const rolling=G.phase==='rolling';
    drawDie('dc0',G.dv[0],rolling,5);drawDie('dc1',G.dv[1],rolling,4);
    const sv=document.getElementById('sum-val'),sl=document.getElementById('sum-lbl'),sb=document.getElementById('sum-box');
    if(sv)sv.textContent=rolling?'…':'?';if(sv)sv.style.color='#4a2060';if(sl)sl.textContent='';if(sb){sb.style.borderColor='#1e0840';sb.style.boxShadow='none';}
    const rb=document.getElementById('rollbtn');
    if(rb){rb.disabled=G.phase!=='idle'||AI[cp];rb.textContent=G.phase==='rolling'?'ROLLING…':'▶ ROLL DICE';}
    drawStore(cp,'sdice','scnt','stip');
  }else{
    drawDie('dc0b',G.dv[0],false,5);drawDie('dc1b',G.dv[1],false,4);
    const col=G.ue?'#b400ff':G.pt?'#ff9500':'#00e5ff';
    const sv2=document.getElementById('sum-val2'),sb2=document.getElementById('sum-box2');
    if(sv2){sv2.textContent=G.sd>=9?'U':String(G.sd);sv2.style.color=col;}
    if(sb2){sb2.style.borderColor=col;sb2.style.boxShadow=`0 0 14px ${col}55`;}
    const sh=document.getElementById('slot-hint');
    if(sh){
      if(G.pt){sh.className='shint power';sh.textContent='⚡ POWER TURN! TAP ANY SLOT';}
      else if(G.ue){sh.className='shint unique';sh.textContent='⚡ UNIQUE! TAP ANY SLOT';}
      else{sh.className='shint normal';sh.textContent=`▼ TAP SLOT ${G.sd} ON BOARD`;}
    }
    drawStore(cp,'sdice2','scnt2','stip2');
  }

  // Combat sheet
  const cs=document.getElementById('combat-sheet');
  const showC=G.phase==='combat'&&G.asl!==null;
  if(showC){
    const tgt=G.board[G.asl];const ow=PC[tgt.owner||0];
    const ci=document.getElementById('cm-icon');if(ci)ci.textContent=UICONS[tgt.unit]||'🗡️';
    const cu=document.getElementById('cm-unit');if(cu){cu.textContent=tgt.unit.toUpperCase();cu.style.color=UCSS[tgt.unit]||'#ff2d78';}
    const cinfo=document.getElementById('cm-info');if(cinfo)cinfo.textContent=`Slot ${G.asl+1} · ${ow.full}`;
    const cp2=document.getElementById('cpts');if(cp2)cp2.textContent=`+${PTS[tgt.unit]||0}PTS`;
    const csub=document.getElementById('cm-sub');if(csub)csub.textContent=`Attack ${ow.full}'s ${tgt.unit}`;
    cs.classList.add('show');
  }else{cs.classList.remove('show');}

  setTimeout(resizeCanvas,0);
}

/* ═══ GAME LOGIC ═══ */
function rd5(){return Math.floor(Math.random()*5)+1;}
function rd4(){return Math.floor(Math.random()*4)+1;}
function nextU(u){const i=UNITS.indexOf(u);return i<UNITS.length-1?UNITS[i+1]:u;}
function canClick(si){
  if(G.phase==='selectSlot'){if(G.pt)return!G.board[si].dis;return si+1===G.sd&&!G.board[si].dis;}
  if(G.phase==='uniqueEvent')return!G.board[si].dis;
  if(G.phase==='combat'){const s=G.board[si];return s.owner!==null&&s.owner!==G.cp&&!s.dis;}
  return false;
}

let rollIv=null;
function doRoll(){
  if(G.phase!=='idle')return;
  initAudio();SFX.roll();
  G.phase='rolling';renderUI();
  let f=0;clearInterval(rollIv);
  rollIv=setInterval(()=>{
    f++;
    drawDie('dc0',rd5(),true,5);drawDie('dc1',rd4(),true,4);
    if(f>=14){
      clearInterval(rollIv);
      const d1=rd5(),d2=rd4();
      G.dv=[d1,d2];
      const sum=d1+d2;
      G.msg=`${PC[G.cp].name} rolled ${d1}+${d2}=${sum}`;
      drawDie('dc0',d1,false,5);drawDie('dc1',d2,false,4);
      const sv=document.getElementById('sum-val');
      if(sv){sv.textContent=sum;sv.style.color='#00e5ff';}
      setTimeout(()=>autoResolve(d1,d2,sum),680);
    }
  },55);
}

function autoResolve(d1,d2,sum){
  const ns=G.ds.map((s,i)=>i===G.cp?[...s,d1]:s);
  const full=ns[G.cp].length>=MS;
  if(full){ns[G.cp]=[];SFX.power();}
  G.ds=ns;G.pt=full;
  const slot=Math.min(sum,9);
  if(sum>=9){
    G.sd=slot;G.phase='uniqueEvent';G.ue=true;
    G.msg=full?`🔥 POWER TURN + ⚡ UNIQUE! Attack any slot!`:`⚡ UNIQUE EVENT! Tap any slot!`;
    SFX.unique();renderUI();if(AI[G.cp])setTimeout(aiSlot,600);return;
  }
  G.sd=slot;G.phase='selectSlot';G.ue=false;
  G.msg=full?`🔥 POWER TURN! ${PC[G.cp].name} — tap any slot!`:`${PC[G.cp].name} — tap SLOT ${slot}.`;
  renderUI();if(AI[G.cp])setTimeout(aiSlot,700);
}

function handleSlot(si){
  if(!['selectSlot','uniqueEvent'].includes(G.phase))return;
  const sl=G.board[si];if(sl.dis)return;
  if(G.phase==='selectSlot'&&!G.pt&&si+1!==G.sd){SFX.error();return;}
  const cp=G.cp;
  if(sl.unit==='Empty'){G.board[si]={unit:'Soldier',owner:cp,dis:false};placeUnit(si,'Soldier',cp);SFX.spawn();G.msg=`${PC[cp].name} spawned Soldier on slot ${si+1}!`;endTurn();return;}
  if(sl.owner===cp){
    if(sl.unit==='Veteran'){G.phase='combat';G.asl=null;G.msg=`⚔ ${PC[cp].name}'s Veteran — pick a target!`;renderUI();if(AI[cp])setTimeout(aiCombat,700);return;}
    const ev=nextU(sl.unit);G.board[si]={...sl,unit:ev};placeUnit(si,ev,cp);SFX.upgrade();
    if(ev==='Veteran'){G.phase='combat';G.asl=null;G.msg=`🎖 ${PC[cp].name} has a VETERAN!`;renderUI();if(AI[cp])setTimeout(aiCombat,700);return;}
    G.msg=`${PC[cp].name} evolved to ${ev}!`;endTurn();return;
  }
  if(sl.owner!==null&&sl.owner!==cp){G.asl=si;G.phase='combat';G.msg=`⚔ Attacking ${PC[sl.owner].name}'s ${sl.unit}!`;renderUI();if(AI[cp])setTimeout(aiCombat,700);}
}

function doCombat(action){
  if(G.phase!=='combat'||G.asl===null)return;
  const si=G.asl,cp=G.cp,tgt=G.board[si];let pts=0;
  animShake(si);
  if(action==='destroy'){pts=PTS[tgt.unit]||0;SFX.destroy();removeUnit(si);G.board[si]={unit:'Empty',owner:null,dis:false};G.msg=`💥 Destroyed! +${pts}pts`;}
  else if(action==='weaken'){pts=Math.floor((PTS[tgt.unit]||0)/2);SFX.weaken();const wi=UNITS.indexOf(tgt.unit),w=wi>1?UNITS[wi-1]:'Soldier';G.board[si]={...tgt,unit:w};placeUnit(si,w,tgt.owner);G.msg=`🔻 Weakened! +${pts}pts`;}
  else{SFX.block();G.board[si]={...tgt,dis:true};setTimeout(()=>{if(G.board[si])G.board[si].dis=false;renderUI();},8000);G.msg=`🚫 Slot ${si+1} blocked!`;}
  G.sc[cp]=Math.min(G.sc[cp]+pts,9999);
  if(G.sc[cp]>=WIN){SFX.victory();G.phase='over';G.winner=cp;G.msg=`🏆 ${PC[cp].full} WINS!`;renderUI();showGO(cp);return;}
  G.phase='idle';G.asl=null;G.ue=false;G.turn++;G.cp=(cp+1)%G.np;renderUI();maybeAI();
}
function doSkip(){SFX.click();const cp=G.cp;G.phase='idle';G.asl=null;G.ue=false;G.pt=false;G.msg=`${PC[cp].name} passed.`;G.turn++;G.cp=(cp+1)%G.np;renderUI();maybeAI();}
function endTurn(){G.phase='idle';G.sd=null;G.asl=null;G.ue=false;G.pt=false;G.turn++;G.cp=(G.cp+1)%G.np;renderUI();maybeAI();}

/* ═══ AI ═══ */
function maybeAI(){if(G.phase!=='idle')return;if(!AI[G.cp])return;G.msg=`${PC[G.cp].name} (AI) thinking…`;renderUI();setTimeout(doRoll,800+Math.random()*400);}
function scoreSlot(si,cp){const s=G.board[si];if(s.dis)return-99;if(s.unit==='Empty')return 2;if(s.owner===cp)return UNITS.indexOf(s.unit)+3+(s.unit==='Veteran'?4:0);return(PTS[s.unit]||0)+3;}
function aiSlot(){
  if(!['selectSlot','uniqueEvent'].includes(G.phase))return;
  const cp=G.cp;let best=-99,bi=null;
  for(let i=0;i<9;i++){if(!canClick(i))continue;const s=scoreSlot(i,cp);if(s>best){best=s;bi=i;}}
  if(bi===null){doSkip();return;}
  const sl=G.board[bi];
  if(sl.owner!==null&&sl.owner!==cp){G.asl=bi;G.phase='combat';G.msg=`⚔ ${PC[cp].name} (AI) attacks!`;renderUI();setTimeout(aiCombat,600);}
  else handleSlot(bi);
}
function aiCombat(){
  if(G.phase!=='combat'){doSkip();return;}
  if(G.asl===null){let bi=null,bv=-1;for(let i=0;i<9;i++){const s=G.board[i];if(s.owner!==null&&s.owner!==G.cp&&!s.dis){const v=PTS[s.unit]||0;if(v>bv){bv=v;bi=i;}}}if(bi===null){doSkip();return;}G.asl=bi;}
  const t=G.board[G.asl];if(!t||t.unit==='Empty'){doSkip();return;}
  const maxE=Math.max(0,...G.sc.filter((_,i)=>i!==G.cp));
  doCombat(t.unit==='Veteran'||maxE>WIN*.7?'destroy':'weaken');
}

/* ═══ GAME OVER ═══ */
function showGO(w){
  const p=PC[w];const box=document.getElementById('go-box');
  box.style.borderColor=p.css;box.style.boxShadow=`0 0 50px ${p.css}44`;
  const gn=document.getElementById('go-name');if(gn){gn.textContent=p.full;gn.style.color=p.css;}
  const gf=document.getElementById('go-fac');if(gf)gf.textContent=p.fac;
  const gs=document.getElementById('go-sc');
  if(gs)gs.innerHTML=PC.slice(0,G.np).map(pl=>`
    <div class="go-row" style="opacity:${pl.id===w?1:.25}">
      <div style="display:flex;align-items:center;gap:7px"><div style="width:7px;height:7px;border-radius:50%;background:${pl.css}"></div><span style="font-family:'Orbitron',sans-serif;font-size:9px;color:${pl.id===w?pl.css:'#4a2060'}">${pl.full}${AI[pl.id]?' (AI)':''}</span></div>
      <span style="font-family:'Orbitron',sans-serif;font-size:13px;color:${pl.id===w?'#fff':'#1c0640'}">${G.sc[pl.id]}</span>
    </div>`).join('');
  document.getElementById('go-overlay').classList.add('show');
}

/* ═══ START ═══ */
function startGame(){
  initAudio();SFX.click();AI[0]=false;G=newGame();
  document.getElementById('go-overlay').classList.remove('show');
  document.getElementById('pcards').innerHTML='';
  // Reset view states
  document.getElementById('view-dice').classList.add('show');
  document.getElementById('view-slot').classList.remove('show');
  showPage('pg-game');
  if(RAF){cancelAnimationFrame(RAF);RAF=null;}
  if(renderer){try{renderer.dispose();}catch(e){}}
  unitM=[];parts=[];slotM=[];
  setTimeout(()=>{
    initThree();
    renderUI();
    drawDie('dc0',1,false,5);
    drawDie('dc1',1,false,4);
  },130);
}

buildSetup();
</script>
